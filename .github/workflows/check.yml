name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build universal .app
        run: make bundle
      - name: Verify app bundle
        run: |
          test -f Tuntun.app/Contents/MacOS/Tuntun
          test -f Tuntun.app/Contents/Info.plist
          file Tuntun.app/Contents/MacOS/Tuntun
          du -sh Tuntun.app
